name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Coverage summary
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total
          const line = `Lines: ${summary.lines.pct}% | Statements: ${summary.statements.pct}% | Functions: ${summary.functions.pct}% | Branches: ${summary.branches.pct}%`
          console.log(line)
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## Coverage\n\n${line}\n`)
          NODE

      - name: Build
        run: pnpm build
