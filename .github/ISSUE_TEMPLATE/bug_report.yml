name: Bug report
description: Report incorrect behavior or a regression
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Include feed URL (if public), command, and output/error.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: v22.x
    validations:
      required: true
  - type: input
    id: pnpm
    attributes:
      label: pnpm version
      placeholder: 10.x
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04 / macOS 15 / Windows 11
    validations:
      required: true
